<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>MiDNI</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:white; }
.contenedor {
  position:relative;
  width:100%;
  max-width:100vw;
  overflow:hidden;
  min-height:100dvh;
}
.imagen {
  display:block;
  width:100%;
  height:auto;
  pointer-events:none;
  user-select:none;
}
.boton {
  position:absolute;
  z-index:9999;
  cursor:pointer;
  background:rgba(255,0,0,0.3);
  border:3px solid red;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  font-weight:bold;
  color:red;
  text-shadow:0 0 6px white;
  min-width:40px;
  min-height:30px;
}
#btnMenu { left:2.5%; top:8.4%; width:11%; height:6%; }
#btnQr   { right:3.5%; top:8.2%; width:11%; height:6%; }
#btnDni  { left:45.5%; top:83.6%; width:47%; height:6.2%; }
#btnCerrarMenu { left:2.5%; top:8.4%; width:11%; height:6%; z-index:99999; }
.fondo-menu {
  position:absolute; inset:0; z-index:100;
  background:rgba(0,0,0,0.24);
  opacity:0; visibility:hidden; pointer-events:none;
  transition:opacity .28s, visibility .28s;
}
.menu-lateral {
  position:absolute; top:0; left:0; z-index:200;
  width:88%; height:100%; overflow:hidden;
  background:white;
  transform:translateX(-105%);
  visibility:hidden;
  transition:transform .34s cubic-bezier(0.22,1,0.36,1), visibility .34s;
  box-shadow:10px 0 25px rgba(0,0,0,0.18);
}
.menu-lateral img {
  display:block; width:100%; height:100%;
  object-fit:cover; pointer-events:none;
}
.abierto .menu-lateral { transform:translateX(0); visibility:visible; }
.abierto .fondo-menu { opacity:1; visibility:visible; pointer-events:auto; }
</style>
</head>
<body>

<div class="contenedor" id="app">
  <img src="./photo2.jpg" class="imagen" alt="">

  <div class="boton" id="btnMenu" onclick="abrirMenu()">MENÚ</div>
  <div class="boton" id="btnQr" onclick="irQR()">QR</div>
  <div class="boton" id="btnDni" onclick="irDNI()">VER DNI</div>

  <div class="fondo-menu" id="fondoMenu" onclick="cerrarMenu()"></div>

  <div class="menu-lateral" id="menuLateral">
    <div class="boton" id="btnCerrarMenu" onclick="cerrarMenu()">←</div>
    <img src="./photo_menu.jpg" alt="">
  </div>
</div>

<script>
function abrirMenu() { document.getElementById('app').classList.add('abierto'); }
function cerrarMenu() { document.getElementById('app').classList.remove('abierto'); }
function irQR() { window.location.href='./qr.html'; }
function irDNI() { window.location.href='./dni.html'; }
document.addEventListener('keydown', function(e) { if(e.key==='Escape') cerrarMenu(); });
</script>

</body>
</html>
