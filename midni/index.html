<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>MiDNI</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MiDNI" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="dni-screen" id="dniScreen">
  <img
    src="./photo2.jpg"
    class="dni-background"
    alt="Pantalla principal"
    draggable="false"
  >

  <div class="hotspot hotspot-menu" id="openMenu" role="button" tabindex="0">
    <span class="hotspot-label">☰ Menú</span>
  </div>

  <div class="hotspot hotspot-qr" id="openQr" role="button" tabindex="0">
    <span class="hotspot-label">📷 QR</span>
  </div>

  <div class="hotspot hotspot-dni" id="openDni" role="button" tabindex="0">
    <span class="hotspot-label">🪪 Ver mi DNI</span>
  </div>

  <div class="menu-backdrop" id="menuBackdrop"></div>

  <aside class="side-menu" id="sideMenu">
    <div class="hotspot hotspot-close-menu" id="closeMenu" role="button" tabindex="0">
      <span class="hotspot-label">← Cerrar</span>
    </div>
    <img
      src="./photo_menu.jpg"
      class="menu-image"
      alt="Menú"
      draggable="false"
    >
  </aside>
</div>

<script src="script.js"></script>
</body>
</html>
