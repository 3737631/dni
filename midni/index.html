<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>MiDNI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100vw;height:100dvh;overflow:hidden;position:relative;background:#0b0b3d;-webkit-text-size-adjust:100%;overscroll-behavior:none}
body{position:fixed;inset:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}

#bg{position:fixed;top:0;left:0;width:100vw;height:100dvh;object-fit:cover;object-position:top center;z-index:1;display:block;user-select:none;pointer-events:none}

.hotspot{position:fixed;z-index:20;background:transparent;border:none;padding:0;margin:0;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;outline:2px solid red;background:rgba(255,0,0,0.12)}
#btnMenu{top:125px;left:35px;width:75px;height:75px}
#btnQr{top:120px;right:30px;width:80px;height:80px}
#btnDni{top:655px;left:35px;width:calc(100vw - 70px);height:100px}

.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);opacity:0;pointer-events:none;transition:opacity .32s ease;z-index:40}
.menu-overlay.open{opacity:1;pointer-events:auto}

.side-menu{position:fixed;top:0;left:0;width:82vw;max-width:360px;height:100dvh;transform:translateX(-100%);transition:transform .32s ease;z-index:50;background:#fff;overflow:hidden}
.side-menu.open{transform:translateX(0)}
.side-menu img{display:block;width:100%;height:100%;object-fit:cover;object-position:left top}
</style>
</head>
<body>
<img id="bg" src="https://3737631.github.io/dni/midni/photo2.jpg" alt="" decoding="sync" fetchpriority="high" draggable="false">

<button id="btnMenu" class="hotspot" aria-label="Menú"></button>
<button id="btnQr" class="hotspot" aria-label="QR"></button>
<button id="btnDni" class="hotspot" aria-label="Mostrar mi DNI"></button>

<div class="menu-overlay" id="menuOverlay"></div>
<div class="side-menu" id="sideMenu"><img src="https://3737631.github.io/dni/midni/photo_menu.jpg" alt=""></div>

<script>
(function(){
  var overlay=document.getElementById('menuOverlay');
  var menu=document.getElementById('sideMenu');
  function openMenu(){menu.classList.add('open');overlay.classList.add('open')}
  function closeMenu(){menu.classList.remove('open');overlay.classList.remove('open')}
  document.getElementById('btnMenu').addEventListener('click',openMenu);
  document.getElementById('btnMenu').addEventListener('touchstart',function(e){e.preventDefault();openMenu()},{passive:false});
  overlay.addEventListener('click',closeMenu);
  document.getElementById('btnQr').addEventListener('click',function(){window.location.href='./qr.html'});
  document.getElementById('btnQr').addEventListener('touchstart',function(e){e.preventDefault();window.location.href='./qr.html'},{passive:false});
  document.getElementById('btnDni').addEventListener('click',function(){window.location.href='./dni.html'});
  document.getElementById('btnDni').addEventListener('touchstart',function(e){e.preventDefault();window.location.href='./dni.html'},{passive:false});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeMenu()});
  document.addEventListener('touchmove',function(e){e.preventDefault()},{passive:false});
  document.addEventListener('wheel',function(e){e.preventDefault()},{passive:false});
})();
</script>
</body>
</html>
