<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>MiDNI</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;width:100%;background:#fff;overflow:hidden}
html{height:100%}
body{position:fixed;inset:0;width:100%;height:100%;overscroll-behavior:none;-webkit-text-size-adjust:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}

.screen{position:fixed;top:0;left:0;width:100vw;height:calc(var(--viewport-height,100svh) + 6vh);overflow:hidden;background:#fff;transform:translateY(-6vh)}

.screen-image{position:absolute;top:0;left:0;display:block;width:100vw;height:auto;max-width:none;pointer-events:none;user-select:none;-webkit-user-drag:none;object-fit:unset;transform:translateZ(0);backface-visibility:hidden;filter:none;opacity:1}

.hotspot{position:absolute;z-index:50;margin:0;padding:0;border:0;outline:0;background:transparent;appearance:none;-webkit-appearance:none;pointer-events:auto;touch-action:manipulation;cursor:pointer}

.hotspot-menu{left:3.1%;top:6.9%;width:10%;height:4.8%}
.hotspot-qr{right:3.3%;top:6.8%;width:10%;height:4.8%}
.hotspot-dni{left:45.6%;top:62.8%;width:46.2%;height:5.8%}

.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);opacity:0;pointer-events:none;transition:opacity .32s ease;z-index:100}
.menu-overlay.open{opacity:1;pointer-events:auto}

.side-menu{position:fixed;top:0;left:0;width:82vw;max-width:360px;height:100dvh;transform:translateX(-100%);transition:transform .32s ease;z-index:200;background:#fff;overflow:hidden}
.side-menu.open{transform:translateX(0)}
.side-menu img{display:block;width:100%;height:100%;object-fit:cover;object-position:left top}
</style>
</head>
<body>
<div class="screen" id="screen">
  <img src="https://3737631.github.io/dni/midni/photo2.jpg" class="screen-image" alt="" draggable="false" decoding="sync" fetchpriority="high">

  <button id="openMenu" class="hotspot hotspot-menu" aria-label="Abrir menú"></button>
  <button id="openQr" class="hotspot hotspot-qr" aria-label="Abrir QR"></button>
  <button id="openDni" class="hotspot hotspot-dni" aria-label="Ver mi DNI"></button>
</div>

<div class="menu-overlay" id="menuOverlay"></div>
<div class="side-menu" id="sideMenu"><img src="https://3737631.github.io/dni/midni/photo_menu.jpg" alt=""></div>

<script>
(function(){
  function updateViewportHeight(){
    var h=window.visualViewport?window.visualViewport.height:window.innerHeight;
    document.documentElement.style.setProperty('--viewport-height',Math.round(h)+'px')
  }
  updateViewportHeight();
  window.addEventListener('resize',updateViewportHeight);
  if(window.visualViewport)window.visualViewport.addEventListener('resize',updateViewportHeight);

  var overlay=document.getElementById('menuOverlay');
  var menu=document.getElementById('sideMenu');
  function openMenu(){menu.classList.add('open');overlay.classList.add('open')}
  function closeMenu(){menu.classList.remove('open');overlay.classList.remove('open')}
  document.getElementById('openMenu').addEventListener('click',openMenu);
  document.getElementById('openMenu').addEventListener('touchstart',function(e){e.preventDefault();openMenu()},{passive:false});
  overlay.addEventListener('click',closeMenu);
  document.getElementById('openQr').addEventListener('click',function(){window.location.href='./qr.html'});
  document.getElementById('openQr').addEventListener('touchstart',function(e){e.preventDefault();window.location.href='./qr.html'},{passive:false});
  document.getElementById('openDni').addEventListener('click',function(){window.location.href='./dni.html'});
  document.getElementById('openDni').addEventListener('touchstart',function(e){e.preventDefault();window.location.href='./dni.html'},{passive:false});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeMenu()});
  document.addEventListener('touchmove',function(e){e.preventDefault()},{passive:false});
  document.addEventListener('wheel',function(e){e.preventDefault()},{passive:false});
})();
</script>
</body>
</html>
