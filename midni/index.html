<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>MiDNI</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MiDNI" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">

    <!-- Pantalla principal con imagen de fondo -->
    <div id="screen-main" class="screen active">
      <div class="pantalla-dni">
        <img src="./photo2.jpg" alt="" class="imagen-pantalla">

        <button class="zona-invisible boton-menu" aria-label="Abrir menú" onclick="abrirMenu()"></button>
        <button class="zona-invisible boton-qr" aria-label="Abrir QR" onclick="abrirQR()"></button>
        <button class="zona-invisible boton-ver-dni" aria-label="Ver mi DNI" onclick="verDNI()"></button>
      </div>
    </div>

    <!-- Pantalla elegir tipo DNI -->
    <div id="screen-choose" class="screen">
      <div class="header">
        <button class="header-btn back-btn" id="back-choose">← Atrás</button>
        <span class="header-title">Mostrar tu DNI</span>
      </div>
      <div class="choose-desc">
        Elige los datos que verán cuando verifiquen tu DNI. Tienes tres opciones:
      </div>
      <div class="options">
        <button class="option-card" id="opt-edad">
          <span class="option-title">DNI edad</span>
          <span class="option-desc">Compartirás tu foto, DNI y si eres mayor de edad.</span>
        </button>
        <button class="option-card" id="opt-simple">
          <span class="option-title">DNI simple</span>
          <span class="option-desc">Compartirás tu foto, DNI, apellidos, nombre, fecha de nacimiento, sexo y fecha de validez del DNI.</span>
        </button>
        <button class="option-card" id="opt-completo">
          <span class="option-title">DNI completo</span>
          <span class="option-desc">Compartirás todos los datos de tu DNI.</span>
        </button>
      </div>
      <div class="choose-footer">Información válida 60 segundos</div>
    </div>

    <!-- Pantalla QR -->
    <div id="screen-qr" class="screen">
      <div class="header">
        <button class="header-btn back-btn" id="back-qr">← Cerrar</button>
        <span class="header-title">Código QR</span>
      </div>
      <div class="qr-container">
        <div class="qr-box" id="qr-box"></div>
        <p class="qr-label" id="qr-label">DNI simple</p>
        <p class="qr-timer" id="qr-timer">Válido <span id="timer-seconds">60</span>s</p>
      </div>
    </div>

    <!-- Pantalla Menú -->
    <div id="screen-menu" class="screen">
      <div class="pantalla-dni">
        <img src="./photo_menu.jpg" alt="" class="imagen-pantalla">
        <button class="zona-invisible boton-cerrar-menu" aria-label="Cerrar menú" onclick="cerrarMenu()"></button>
      </div>
    </div>

    <!-- Pantalla Verificar -->
    <div id="screen-verify" class="screen">
      <div class="header">
        <button class="header-btn back-btn" id="back-verify">← Atrás</button>
        <span class="header-title">Verificar</span>
      </div>
      <div class="verify-container">
        <div class="camera-placeholder">
          <span class="camera-icon">📷</span>
          <p>Apunta al código QR</p>
        </div>
      </div>
    </div>

  </main>
  <script src="script.js"></script>
</body>
</html>
