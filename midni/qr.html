<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>MiDNI - QR</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#fff}
body{position:fixed;inset:0;overscroll-behavior:none;-webkit-text-size-adjust:100%;font-family:-apple-system,Helvetica,Arial,sans-serif}
.app-screen{position:fixed;inset:0;width:100vw;height:100dvh;overflow:hidden;background:#fff}
.screen-image{position:absolute;inset:0;display:block;width:100%;height:100%;object-fit:cover;object-position:center top;user-select:none;pointer-events:none;-webkit-user-drag:none}
.hotspot{position:absolute;z-index:20;margin:0;padding:0;border:0;background:transparent;outline:none;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;appearance:none}
#back{left:8%;top:9%;width:12%;height:7%}
</style>
</head>
<body>
<div class="app-screen">
  <img src="https://3737631.github.io/dni/midni/photo_dni.jpg" class="screen-image" alt="">
  <button id="back" class="hotspot" aria-label="Volver"></button>
</div>
<script>
document.getElementById('back').addEventListener('click',function(){window.location.href='./index.html'});
document.getElementById('back').addEventListener('touchstart',function(e){e.preventDefault();window.location.href='./index.html'},{passive:false});
document.addEventListener('touchmove',function(e){e.preventDefault()},{passive:false});
document.addEventListener('wheel',function(e){e.preventDefault()},{passive:false});
</script>
</body>
</html>
