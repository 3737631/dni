<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validador DNI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Validador de DNI</h1>
    <p class="subtitle">Comprueba si tu DNI español es válido</p>
    <div class="card">
      <input type="text" id="dniInput" placeholder="Ej: 12345678Z" maxlength="9" autofocus>
      <button id="checkBtn">Validar</button>
      <p id="result" class="result"></p>
    </div>
    <footer>
      <p>DNI &copy; 2026</p>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
